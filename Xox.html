<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ausgabetopf">
<title>Ausgabetopf</title>
<style>
  :root{
    --bg:#1b1f1d;
    --paper:#f4f1ea;
    --ink:#1b1f1d;
    --green:#3f6e52;
    --green-light:#5e9476;
    --red:#b3503f;
    --line:#d8d2c4;
    --mono: 'SF Mono', 'Roboto Mono', monospace;
    --serif: 'Iowan Old Style', 'Georgia', serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:var(--serif);
    background:var(--bg);
    color:var(--paper);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:24px 12px;
  }
  .app{
    width:100%;
    max-width:420px;
  }
  .topf{
    background:var(--paper);
    color:var(--ink);
    border-radius:18px;
    padding:28px 24px;
    text-align:center;
    position:relative;
    overflow:hidden;
  }
  .topf::before{
    content:"";
    position:absolute;
    top:0;left:0;right:0;
    height:6px;
    background:var(--green);
  }
  .label{
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:0.15em;
    text-transform:uppercase;
    color:#777;
    margin-bottom:6px;
  }
  .betrag{
    font-size:52px;
    font-weight:600;
    line-height:1;
    margin:4px 0 2px;
    transition:color .2s;
  }
  .betrag.neg{color:var(--red);}
  .betrag.pos{color:var(--green);}
  .of{
    font-family:var(--mono);
    font-size:13px;
    color:#999;
  }
  .bar{
    height:8px;
    background:var(--line);
    border-radius:4px;
    margin:16px 0 4px;
    overflow:hidden;
  }
  .bar-fill{
    height:100%;
    background:var(--green);
    transition:width .3s, background .3s;
  }
  .bar-fill.warn{background:#c9a13a;}
  .bar-fill.empty{background:var(--red);}

  .card{
    background:#262b28;
    border-radius:14px;
    padding:18px 20px;
    margin-top:16px;
  }
  .card h2{
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:0.15em;
    text-transform:uppercase;
    color:#9aa39c;
    margin:0 0 12px;
    font-weight:500;
  }
  .row{display:flex; gap:8px;}
  input[type=number], input[type=text]{
    flex:1;
    background:#1b1f1d;
    border:1px solid #3a423d;
    color:var(--paper);
    border-radius:8px;
    padding:10px 12px;
    font-size:16px;
    font-family:var(--mono);
    outline:none;
  }
  input::placeholder{color:#6b746e;}
  input:focus{border-color:var(--green-light);}

  button{
    border:none;
    border-radius:8px;
    padding:10px 16px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    font-family:var(--mono);
    transition:transform .08s, opacity .15s;
  }
  button:active{transform:scale(0.96);}
  .btn-primary{background:var(--green); color:#fff;}
  .btn-ghost{background:transparent; color:var(--paper); border:1px solid #3a423d;}
  .btn-danger{background:var(--red); color:#fff;}

  .reset-row{display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;}
  .reset-row button{flex:1; min-width:60px;}
  .custom-reset{display:flex; gap:8px; margin-top:10px;}
  .custom-reset input{width:80px; flex:none;}

  .tabs{display:flex; gap:6px; margin-top:16px;}
  .tab{
    flex:1;
    text-align:center;
    padding:8px;
    border-radius:8px;
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:.08em;
    text-transform:uppercase;
    cursor:pointer;
    color:#9aa39c;
    background:#262b28;
  }
  .tab.active{background:var(--green); color:#fff;}

  .stat-row{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    padding:8px 0;
    border-bottom:1px solid #3a423d;
    font-size:14px;
  }
  .stat-row:last-child{border-bottom:none;}
  .stat-label{color:#cfd4cf;}
  .stat-val{font-family:var(--mono); font-weight:600;}

  .entry{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:8px 0;
    border-bottom:1px solid #333a35;
    font-size:13px;
  }
  .entry:last-child{border-bottom:none;}
  .entry-meta{color:#8b948e; font-size:11px; font-family:var(--mono); margin-top:2px;}
  .entry-left{display:flex; flex-direction:column;}
  .entry-amt{font-family:var(--mono); color:var(--red); font-weight:600;}
  .entry-amt.reset{color:var(--green);}
  .del{
    background:none; border:none; color:#6b746e;
    cursor:pointer; font-size:14px; padding:0 0 0 10px;
  }
  .empty-msg{color:#6b746e; font-size:13px; text-align:center; padding:14px 0;}

  .hidden{display:none;}
  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--green); color:#fff; padding:10px 18px; border-radius:8px;
    font-family:var(--mono); font-size:13px; opacity:0; transition:opacity .25s;
    pointer-events:none;
  }
  .toast.show{opacity:1;}
</style>
</head>
<body>
<div class="app">

  <div class="topf">
    <div class="label">Ausgabetopf</div>
    <div class="betrag pos" id="betrag">€0.00</div>
    <div class="of" id="ofLabel">von €250.00</div>
    <div class="bar"><div class="bar-fill" id="barFill" style="width:100%"></div></div>
  </div>

  <div class="card">
    <h2>Ausgabe eintragen</h2>
    <div class="row">
      <input type="number" id="ausgabeInput" placeholder="Betrag (€)" inputmode="decimal" step="0.01" min="0">
      <button class="btn-primary" id="ausgabeBtn">Abziehen</button>
    </div>
    <input type="text" id="ausgabeNotiz" placeholder="Notiz (optional)" style="margin-top:8px;">
  </div>

  <div class="card">
    <h2>Reset</h2>
    <div class="reset-row">
      <button class="btn-ghost" id="resetStandard">Standard (€250)</button>
    </div>
    <div class="custom-reset">
      <input type="number" id="customResetInput" placeholder="Anderer Betrag" inputmode="decimal" step="0.01" min="0">
      <button class="btn-ghost" id="customResetBtn">Reset auf Betrag</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-view="alle">Alle</div>
    <div class="tab" data-view="woche">Woche</div>
    <div class="tab" data-view="monat">Monat</div>
  </div>

  <div class="card" style="margin-top:8px;">
    <h2>Übersicht</h2>
    <div id="statRows"></div>
  </div>

  <div class="card">
    <h2>Verlauf</h2>
    <div id="entries"></div>
  </div>

  <div class="card">
    <button class="btn-danger" id="alleResetBtn" style="width:100%;">Alle Daten löschen</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const DEFAULT_LIMIT = 250;
let state = { current: DEFAULT_LIMIT, lastLimit: DEFAULT_LIMIT, entries: [] };
let currentView = 'alle';

const els = {
  betrag: document.getElementById('betrag'),
  ofLabel: document.getElementById('ofLabel'),
  barFill: document.getElementById('barFill'),
  ausgabeInput: document.getElementById('ausgabeInput'),
  ausgabeNotiz: document.getElementById('ausgabeNotiz'),
  ausgabeBtn: document.getElementById('ausgabeBtn'),
  resetStandard: document.getElementById('resetStandard'),
  customResetInput: document.getElementById('customResetInput'),
  customResetBtn: document.getElementById('customResetBtn'),
  statRows: document.getElementById('statRows'),
  entries: document.getElementById('entries'),
  alleResetBtn: document.getElementById('alleResetBtn'),
  toast: document.getElementById('toast'),
};

function showToast(msg){
  els.toast.textContent = msg;
  els.toast.classList.add('show');
  setTimeout(()=>els.toast.classList.remove('show'), 1400);
}

function fmt(n){
  return '€' + n.toFixed(2).replace('.', ',');
}

async function load(){
  try{
    const raw = localStorage.getItem('ausgabetopf-state');
    if(raw){
      const parsed = JSON.parse(raw);
      state = Object.assign(state, parsed);
    }
  }catch(e){
    // kein gespeicherter Stand vorhanden
  }
  render();
}

async function save(){
  try{
    localStorage.setItem('ausgabetopf-state', JSON.stringify(state));
  }catch(e){
    showToast('Speichern fehlgeschlagen');
  }
}

function render(){
  // Topf
  els.betrag.textContent = fmt(state.current);
  els.ofLabel.textContent = 'von ' + fmt(state.lastLimit);
  els.betrag.classList.remove('pos','neg');
  els.betrag.classList.add(state.current < 0 ? 'neg' : 'pos');

  let pct = state.lastLimit > 0 ? (state.current / state.lastLimit) * 100 : 0;
  pct = Math.max(0, Math.min(100, pct));
  els.barFill.style.width = pct + '%';
  els.barFill.classList.remove('warn','empty');
  if(state.current <= 0) els.barFill.classList.add('empty');
  else if(pct < 25) els.barFill.classList.add('warn');

  renderStats();
  renderEntries();
}

function isInRange(dateStr, range){
  const d = new Date(dateStr);
  const now = new Date();
  if(range === 'alle') return true;
  if(range === 'woche'){
    const diff = (now - d) / (1000*60*60*24);
    return diff <= 7;
  }
  if(range === 'monat'){
    const diff = (now - d) / (1000*60*60*24);
    return diff <= 30;
  }
  return true;
}

function renderStats(){
  const ausgaben = state.entries.filter(e => e.type === 'ausgabe');
  const resets = state.entries.filter(e => e.type === 'reset');

  const woche = ausgaben.filter(e => isInRange(e.date, 'woche'));
  const monat = ausgaben.filter(e => isInRange(e.date, 'monat'));

  const sum = arr => arr.reduce((a,b)=>a+b.amount,0);

  els.statRows.innerHTML = `
    <div class="stat-row"><span class="stat-label">Aktueller Topf</span><span class="stat-val">${fmt(state.current)}</span></div>
    <div class="stat-row"><span class="stat-label">Letztes Limit</span><span class="stat-val">${fmt(state.lastLimit)}</span></div>
    <div class="stat-row"><span class="stat-label">Ausgaben letzte 7 Tage</span><span class="stat-val">${fmt(sum(woche))} <span style="color:#6b746e">(${woche.length}x)</span></span></div>
    <div class="stat-row"><span class="stat-label">Ausgaben letzte 30 Tage</span><span class="stat-val">${fmt(sum(monat))} <span style="color:#6b746e">(${monat.length}x)</span></span></div>
    <div class="stat-row"><span class="stat-label">Ausgaben gesamt</span><span class="stat-val">${fmt(sum(ausgaben))} <span style="color:#6b746e">(${ausgaben.length}x)</span></span></div>
    <div class="stat-row"><span class="stat-label">Resets gesamt</span><span class="stat-val">${resets.length}x</span></div>
  `;
}

function renderEntries(){
  const filtered = state.entries
    .filter(e => isInRange(e.date, currentView))
    .slice()
    .reverse();

  if(filtered.length === 0){
    els.entries.innerHTML = '<div class="empty-msg">Keine Einträge in diesem Zeitraum.</div>';
    return;
  }

  els.entries.innerHTML = filtered.map(e => {
    const d = new Date(e.date);
    const dateStr = d.toLocaleDateString('de-DE', {day:'2-digit', month:'2-digit', year:'2-digit'}) +
                     ' · ' + d.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
    if(e.type === 'reset'){
      return `
        <div class="entry">
          <div class="entry-left">
            <span>Reset auf ${fmt(e.amount)}</span>
            <span class="entry-meta">${dateStr}</span>
          </div>
          <span class="entry-amt reset">↺</span>
        </div>`;
    }
    return `
      <div class="entry">
        <div class="entry-left">
          <span>${e.note ? e.note : 'Ausgabe'}</span>
          <span class="entry-meta">${dateStr}</span>
        </div>
        <span class="entry-amt">−${fmt(e.amount).slice(1)}</span>
      </div>`;
  }).join('');
}

// Events
els.ausgabeBtn.addEventListener('click', async () => {
  const val = parseFloat(els.ausgabeInput.value);
  if(isNaN(val) || val <= 0){
    showToast('Bitte gültigen Betrag eingeben');
    return;
  }
  state.current -= val;
  state.entries.push({
    type:'ausgabe',
    amount: val,
    note: els.ausgabeNotiz.value.trim(),
    date: new Date().toISOString()
  });
  els.ausgabeInput.value = '';
  els.ausgabeNotiz.value = '';
  await save();
  render();
  showToast('Ausgabe eingetragen');
});

els.resetStandard.addEventListener('click', async () => {
  state.current = DEFAULT_LIMIT;
  state.lastLimit = DEFAULT_LIMIT;
  state.entries.push({type:'reset', amount: DEFAULT_LIMIT, date: new Date().toISOString()});
  await save();
  render();
  showToast('Topf auf €250 zurückgesetzt');
});

els.customResetBtn.addEventListener('click', async () => {
  const val = parseFloat(els.customResetInput.value);
  if(isNaN(val) || val < 0){
    showToast('Bitte gültigen Betrag eingeben');
    return;
  }
  state.current = val;
  state.lastLimit = val;
  state.entries.push({type:'reset', amount: val, date: new Date().toISOString()});
  els.customResetInput.value = '';
  await save();
  render();
  showToast('Topf auf ' + fmt(val) + ' zurückgesetzt');
});

els.alleResetBtn.addEventListener('click', async () => {
  if(!confirm('Wirklich alle Daten löschen? Das kann nicht rückgängig gemacht werden.')) return;
  state = { current: DEFAULT_LIMIT, lastLimit: DEFAULT_LIMIT, entries: [] };
  await save();
  render();
  showToast('Alle Daten gelöscht');
});

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentView = tab.dataset.view;
    renderEntries();
  });
});

load();
</script>
</body>
</html>
